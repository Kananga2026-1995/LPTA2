<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionnaire de tâches</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body onload="initialiserApplication()">
  <main>
    <h1>Gestionnaire de tâches</h1>
    <p>Ajoutez, suivez et organisez vos tâches facilement.</p>

    <section aria-labelledby="titreFormulaire">
      <h2 id="titreFormulaire">Ajouter une tâche</h2>
      <form id="formTache">
        <label for="champTitre">Titre</label>
        <input
          id="champTitre"
          type="text"
          placeholder="Exemple : Finaliser le rapport"
          required
        />

        <label for="champDescription">Description</label>
        <textarea
          id="champDescription"
          rows="4"
          placeholder="Décrivez brièvement la tâche"
          required
        ></textarea>

        <label for="champPriorite">Priorité</label>
        <select id="champPriorite" required>
          <option value="Basse">Basse</option>
          <option value="Moyenne" selected>Moyenne</option>
          <option value="Haute">Haute</option>
        </select>

        <button type="submit" id="boutonAjouter">Ajouter la tâche</button>
      </form>
    </section>

    <section aria-labelledby="titreFiltres">
      <h2 id="titreFiltres">Filtrer les tâches</h2>
      <div class="zone-filtres" role="group" aria-label="Filtres de tâches">
        <button type="button" class="bouton-filtre actif" data-filtre="toutes">Toutes</button>
        <button type="button" class="bouton-filtre" data-filtre="en-cours">En cours</button>
        <button type="button" class="bouton-filtre" data-filtre="completees">Complétées</button>
      </div>
      <p id="compteurResultats">0 tâche</p>
    </section>

    <section aria-live="polite" aria-labelledby="titreListe">
      <h2 id="titreListe">Liste des tâches</h2>
      <div id="listeTaches" class="grille-taches"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
